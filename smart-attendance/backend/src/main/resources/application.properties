# backend/src/main/resources/application.properties

server.port=8080

# Firebase Service Account key path
# In Render/Production, set FIREBASE_SERVICE_ACCOUNT_PATH to file:/etc/secrets/serviceAccountKey.json
firebase.service-account-path=${FIREBASE_SERVICE_ACCOUNT_PATH:classpath:firebase-service-account.json}

# Gemini API Key (from Google AI Studio)
gemini.api.key=${GEMINI_API_KEY:YOUR_GEMINI_API_KEY_HERE}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent

# CORS – allow frontend origins
cors.allowed-origins=http://localhost:3000,https://your-frontend.vercel.app

# Logging
logging.level.com.attendance=DEBUG
